name: Code Quality Checks

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]
    paths:
      - "src/**"
      - "components/**"
      - "app/**"
      - "android/**"
      - "modules/**"
      - "scripts/verify-hms-build.ts"
      - "*.{js,jsx,ts,tsx}"
      - "package.json"
      - "bun.lock"
      - ".eslintrc.*"
      - ".prettierrc*"
      - "expo.json"
      - "app.json"
      - ".github/workflows/code-quality.yml"

jobs:
  quality-checks:
    name: Lint & Format
    runs-on: ubuntu-latest

    steps:
      - name: 🏗 Setup repo
        uses: actions/checkout@v4

      - name: 🏗 Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: ".bun-version"

      - name: 📦 Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: 📦 Install dependencies
        run: bun install --frozen-lockfile

      - name: 🔍 Run Expo Lint
        run: bun run lint

      - name: 💎 Check Prettier formatting
        run: bun run format --check "**/*.{js,jsx,ts,tsx,json,md,yml}"

  verify-hms-android:
    name: HMS Android Source Gate
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 🏗 Setup repo
        uses: actions/checkout@v4

      - name: 🏗 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: 🏗 Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: ".bun-version"

      - name: 🏗 Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: "gradle"

      - name: 🏗 Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: 📦 Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/.bun/install/cache
            ~/.android/build-cache
          key: ${{ runner.os }}-hms-source-${{ hashFiles('bun.lock', 'package.json', 'android/**/*.gradle*', 'modules/**/android/**/*.gradle*', 'modules/expo-hms-notifications/scripts/**') }}
          restore-keys: |
            ${{ runner.os }}-hms-source-

      - name: 📦 Install dependencies
        run: bun install --frozen-lockfile

      - name: 🛡 Verify HMS dependency graph
        run: bun run verify:android:hms

      - name: 🔨 Compile HMS native replacements
        working-directory: android
        env:
          BUILD_VARIANT: hms
        run: |
          ./gradlew \
            :expo-hms-notifications:assembleRelease \
            :expo-hms-compat:assembleRelease \
            :expo-hms-location:assembleRelease
