// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
  repositories {
    google()
    mavenCentral()
    if (System.getenv("BUILD_VARIANT") == "hms") {
      maven { url 'https://developer.huawei.com/repo/' }
    }
  }
  dependencies {
    // AGConnect requires the Android Gradle Plugin coordinate to carry its version explicitly.
    // Keep this aligned with React Native's gradle/libs.versions.toml.
    classpath('com.android.tools.build:gradle:8.12.0')
    classpath('com.facebook.react:react-native-gradle-plugin')
    classpath('org.jetbrains.kotlin:kotlin-gradle-plugin')
    if (System.getenv("BUILD_VARIANT") == "hms") {
      classpath('com.huawei.agconnect:agcp:1.9.1.301')
    }
  }
}

plugins {
  id 'org.jetbrains.kotlin.plugin.compose' version '2.1.20' apply false
}

allprojects {
  repositories {
    google()
    mavenCentral()
    maven { url 'https://www.jitpack.io' }
    if (System.getenv("BUILD_VARIANT") == "hms") {
      maven { url 'https://developer.huawei.com/repo/' }
    }
  }

  if (System.getenv("BUILD_VARIANT") == "hms") {
    configurations.configureEach {
      resolutionStrategy.eachDependency { details ->
        if (details.requested.group in [
          'com.google.android.gms',
          'com.google.android.play',
          'com.google.firebase'
        ]) {
          throw new GradleException(
            "HMS builds cannot resolve Google mobile-service dependency ${details.requested}"
          )
        }
      }
    }
  }
}

apply plugin: "expo-root-project"
apply plugin: "com.facebook.react.rootproject"
