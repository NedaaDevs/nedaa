appId: dev.nedaa.android
---
# Stop, then open the link cold so the app launches *with* the deep link as
# its initial URL — the only point Expo Router reliably navigates from.
# Android's Maestro driver can't see the 1x1 readiness marker, so we settle on
# animation completion. Three stacked settles give the cold launch + splash
# fade enough margin that we don't capture the splash/loading state.
- stopApp
- openLink: ${SCREENSHOT_URL}
- waitForAnimationToEnd:
    timeout: 8000
- waitForAnimationToEnd:
    timeout: 8000
- waitForAnimationToEnd:
    timeout: 8000
- takeScreenshot: ${OUT_PATH}
