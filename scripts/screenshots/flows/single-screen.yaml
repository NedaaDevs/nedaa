appId: dev.nedaa.app
---
- launchApp:
    clearState: false
- runFlow:
    when:
      visible:
        text: "Continue"
    commands:
      - tapOn:
          text: "Continue"
- openLink: ${SCREENSHOT_URL}
- waitForAnimationToEnd:
    timeout: 5000
- assertVisible:
    id: "screenshot-ready"
- takeScreenshot: ${OUT_PATH}
